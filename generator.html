<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIGI Campaign Generator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body { 
  font-family: 'Segoe UI', Arial, sans-serif; 
  background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%);
  color: #fff; 
  padding: 20px; 
  direction: rtl;
  min-height: 100vh;
}

.login-container {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

.login-box {
  background: #1a1f2e;
  padding: 60px 40px;
  border-radius: 16px;
  border: 1px solid #333;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  max-width: 420px;
  width: 100%;
  text-align: center;
}

.login-header {
  background: linear-gradient(135deg, #9E8DA7 0%, #6B5B7E 100%);
  padding: 30px;
  border-radius: 12px;
  margin-bottom: 30px;
}

.login-header h1 { font-size: 32px; margin-bottom: 10px; }
.login-header p { font-size: 13px; opacity: 0.9; }

.login-form { display: flex; flex-direction: column; }
.login-form label { margin-bottom: 12px; font-size: 14px; color: #9E8DA7; font-weight: 600; text-align: right; }
.login-form input { padding: 14px; background: #222; border: 2px solid #333; color: #fff; border-radius: 8px; font-size: 14px; margin-bottom: 20px; text-align: center; direction: ltr; transition: all 0.3s; }
.login-form input:focus { outline: none; border-color: #9E8DA7; background: #2a2f3e; box-shadow: 0 0 0 3px rgba(158, 141, 167, 0.15); }

.login-btn { padding: 14px; background: linear-gradient(135deg, #9E8DA7 0%, #6B5B7E 100%); border: none; color: #fff; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 15px; transition: all 0.3s; box-shadow: 0 4px 15px rgba(158, 141, 167, 0.3); }
.login-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(158, 141, 167, 0.4); }

.login-error { background: #3a2a2a; color: #ff9999; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 12px; border-left: 4px solid #ff9999; display: none; }

.app-container { display: none; }

.main { max-width: 1200px; margin: 0 auto; }
.header { background: linear-gradient(135deg, #9E8DA7 0%, #6B5B7E 100%); padding: 40px 20px; text-align: center; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 8px 32px rgba(158, 141, 167, 0.3); }
.header h1 { font-size: 32px; margin-bottom: 5px; font-weight: 700; }
.header p { font-size: 14px; opacity: 0.95; }

.form-box { background: #1a1f2e; padding: 30px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; }
.form-box h2 { color: #9E8DA7; margin-bottom: 20px; font-size: 18px; font-weight: 600; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.form-row.full { grid-template-columns: 1fr; }

.form-group label { display: block; margin-bottom: 8px; font-size: 13px; color: #aaa; font-weight: 600; }
.form-group input, .form-group textarea, .form-group select { 
  width: 100%;
  padding: 12px; 
  background: #222; 
  border: 1px solid #333; 
  color: #fff; 
  border-radius: 8px; 
  font-family: inherit; 
  font-size: 14px;
  transition: all 0.3s;
}
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { 
  outline: none; 
  border-color: #9E8DA7; 
  background: #2a2f3e;
  box-shadow: 0 0 0 3px rgba(158, 141, 167, 0.15);
}
.form-group textarea { min-height: 100px; resize: vertical; }

.upload-area { border: 2px dashed #9E8DA7; padding: 30px; text-align: center; border-radius: 12px; cursor: pointer; transition: all 0.3s; background: rgba(158, 141, 167, 0.05); }
.upload-area:hover { background: rgba(158, 141, 167, 0.1); border-color: #b5a0b8; }
.upload-area input { display: none; }
.upload-area-text { font-size: 14px; color: #9E8DA7; margin-bottom: 8px; font-weight: 600; }
.upload-area-hint { font-size: 12px; color: #666; margin-bottom: 12px; }
.file-list { text-align: right; margin-top: 12px; }
.file-item { font-size: 12px; color: #8ae89a; padding: 6px 0; border-bottom: 1px solid #333; }

.btn-primary { 
  width: 100%; 
  padding: 14px; 
  background: linear-gradient(135deg, #9E8DA7 0%, #6B5B7E 100%); 
  border: none;
  color: #fff;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 700;
  font-size: 15px;
  transition: all 0.3s;
  box-shadow: 0 4px 15px rgba(158, 141, 167, 0.3);
  margin-bottom: 20px;
}
.btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(158, 141, 167, 0.4); }
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

.alert { padding: 14px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; display: none; }
.alert.error { background: #3a2a2a; border-left: 4px solid #ff9999; color: #ff9999; }
.alert.success { background: #2a3a2a; border-left: 4px solid #8ae89a; color: #8ae89a; }

.results { background: #1a1f2e; padding: 30px; border-radius: 12px; border: 1px solid #333; display: none; }
.results.show { display: block; }

.tabs { display: flex; gap: 12px; margin-bottom: 20px; border-bottom: 2px solid #333; flex-wrap: wrap; padding-bottom: 12px; overflow-x: auto; }
.tab-btn { padding: 10px 16px; background: transparent; border: none; color: #9E8DA7; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.3s; font-size: 13px; font-weight: 700; white-space: nowrap; position: relative; bottom: -2px; }
.tab-btn.active { border-bottom-color: #9E8DA7; color: #fff; }
.tab-btn:hover { color: #fff; }

.tab-content { display: none; }
.tab-content.active { display: block; }
.tab-content { background: #222; padding: 24px; border-radius: 8px; line-height: 1.9; font-size: 13px; max-height: 700px; overflow-y: auto; white-space: pre-wrap; word-wrap: break-word; border: 1px solid #333; }

.actions { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
.btn-secondary { flex: 1; min-width: 120px; padding: 11px 16px; background: #2a2f3e; border: 1.5px solid #9E8DA7; color: #9E8DA7; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 700; transition: all 0.3s; }
.btn-secondary:hover { background: #3a3f4e; color: #fff; border-color: #fff; }

.status-badge { display: inline-block; background: #2a3a2a; color: #8ae89a; padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 600; margin-bottom: 20px; border-left: 3px solid #8ae89a; }

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #333; }
::-webkit-scrollbar-thumb { background: #9E8DA7; border-radius: 4px; }

@media (max-width: 768px) {
  .header h1 { font-size: 24px; }
  .form-box { padding: 20px; }
  .form-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Login Screen -->
<div id="loginContainer" class="login-container">
  <div class="login-box">
    <div class="login-header">
      <h1>🔐 DIGI Generator</h1>
      <p>Campaign Generator - Professional Edition</p>
    </div>
    
    <div id="loginError" class="login-error"></div>
    
    <div class="login-form">
      <label>הקלד סיסמה:</label>
      <input type="password" id="passwordInput" placeholder="••••••••" autofocus autocomplete="off">
      <button type="button" class="login-btn" onclick="handleLogin()">🔓 פתח</button>
    </div>
  </div>
</div>

<!-- App Screen -->
<div id="appContainer" class="app-container">
<div class="main">
  <div class="header">
    <h1>🎯 DIGI Campaign Generator</h1>
    <p>אסטרטגיה + זוויות + באנרים + סקריפטים וידאו + targeting</p>
  </div>

  <div class="form-box">
    <div class="status-badge">✅ מחובר ל-API | מוכן ליצור קמפיינים</div>
    
    <h2>📋 פרטי הקמפיין</h2>
    
    <div class="form-row">
      <div class="form-group">
        <label>שם לקוח *</label>
        <input type="text" id="clientName" placeholder="Anjaly, Kiwi, Lucaffe...">
      </div>
      <div class="form-group">
        <label>סוג קמפיין *</label>
        <select id="campaignType">
          <option value="">-- בחר --</option>
          <option value="Meta">Meta (Facebook/Instagram)</option>
          <option value="Google">Google Ads</option>
          <option value="Mixed">Mixed (Meta + Google)</option>
          <option value="TikTok">TikTok / Shorts</option>
          <option value="LinkedIn">LinkedIn</option>
          <option value="WhatsApp">WhatsApp Business</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>קהל יעד *</label>
        <input type="text" id="targetAudience" placeholder="נשים 25-45...">
      </div>
      <div class="form-group">
        <label>מטרה *</label>
        <select id="campaignGoal">
          <option value="">-- בחר --</option>
          <option value="Sales">Sales / ROAS</option>
          <option value="Leads">Leads / CPL</option>
          <option value="Traffic">Traffic / CPC</option>
          <option value="Awareness">Brand Awareness</option>
          <option value="Engagement">Engagement</option>
        </select>
      </div>
    </div>

    <div class="form-row full">
      <div class="form-group">
        <label>תיאור (optional)</label>
        <textarea id="description" placeholder="תיאור של המוצר..."></textarea>
      </div>
    </div>

    <div class="form-row full">
      <div class="upload-area" onclick="document.getElementById('referenceFile').click();">
        <div class="upload-area-text">📸 העלה רפרנסים (optional)</div>
        <div class="upload-area-hint">תמונות, PDF וכו'</div>
        <input type="file" id="referenceFile" multiple>
        <div class="file-list" id="fileList"></div>
      </div>
    </div>

    <div id="alertMsg" class="alert"></div>
    <button type="button" class="btn-primary" onclick="generateCampaign()">🚀 יצור קמפיין</button>
  </div>

  <div class="results" id="results">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('strategy')">📊 אסטרטגיה</button>
      <button class="tab-btn" onclick="switchTab('angles')">🎯 זוויות</button>
      <button class="tab-btn" onclick="switchTab('banners')">🎨 באנרים</button>
      <button class="tab-btn" onclick="switchTab('scripts')">🎬 סקריפטים</button>
      <button class="tab-btn" onclick="switchTab('targeting')">🎪 Targeting</button>
    </div>

    <div id="strategy" class="tab-content active"></div>
    <div id="angles" class="tab-content"></div>
    <div id="banners" class="tab-content"></div>
    <div id="scripts" class="tab-content"></div>
    <div id="targeting" class="tab-content"></div>

    <div class="actions">
      <button class="btn-secondary" onclick="copyTab()">📋 העתק</button>
      <button class="btn-secondary" onclick="downloadTab()">📥 הורד</button>
      <button class="btn-secondary" onclick="downloadAll()">💾 הורד הכל</button>
      <button class="btn-secondary" onclick="reset()">🔄 חדש</button>
    </div>
  </div>
</div>
</div>

<script>
const CORRECT_PASSWORD = 'DIGIB1970';
const API_KEY = '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';
let currentTab = 'strategy';
let resultsData = {};

function handleLogin() {
  const password = document.getElementById('passwordInput').value;
  const errorDiv = document.getElementById('loginError');

  if (password === CORRECT_PASSWORD) {
    document.getElementById('loginContainer').style.display = 'none';
    document.getElementById('appContainer').style.display = 'block';
  } else {
    errorDiv.textContent = '❌ סיסמה לא נכונה';
    errorDiv.style.display = 'block';
    document.getElementById('passwordInput').value = '';
  }
}

document.getElementById('passwordInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') handleLogin();
});

document.getElementById('referenceFile').addEventListener('change', (e) => {
  const files = Array.from(e.target.files);
  const fileList = document.getElementById('fileList');
  fileList.innerHTML = '';
  files.forEach(file => {
    const item = document.createElement('div');
    item.className = 'file-item';
    item.textContent = `✓ ${file.name}`;
    fileList.appendChild(item);
  });
});

async function generateCampaign() {
  const clientName = document.getElementById('clientName').value.trim();
  const campaignType = document.getElementById('campaignType').value;
  const targetAudience = document.getElementById('targetAudience').value.trim();
  const campaignGoal = document.getElementById('campaignGoal').value;
  const description = document.getElementById('description').value.trim();

  if (!clientName || !campaignType || !targetAudience || !campaignGoal) {
    showAlert('⚠️ מלא את כל השדות הנדרשים', 'error');
    return;
  }

  const btn = event.target;
  btn.disabled = true;
  btn.textContent = '⏳ מייצר...';

  try {
    const prompt = `אתה יצור קמפיינים בעברית. עבור: ${clientName}, ${campaignType}, קהל: ${targetAudience}, מטרה: ${campaignGoal}. תיאור: ${description || 'כללי'}.

תן בדיוק 5 חלקים:

**📊 אסטרטגיה**
[3-4 פסקאות מלאות עם אסטרטגיה טקטית ברורה]

**🎯 זוויות (5 זוויות)**
1. [זווית 1]
2. [זווית 2]
3. [זווית 3]
4. [זווית 4]
5. [זווית 5]

**🎨 באנרים (3 קונספטים)**
1. [קונספט 1 עם headline וvisual ideas]
2. [קונספט 2]
3. [קונספט 3]

**🎬 סקריפטים וידאו**

סקריפט ריל 15 שניות:
[כתוב סקריפט עם hook, בעיה, פתרון, CTA]

סקריפט ריל 30 שניות:
[סקריפט מורחב]

סקריפט TikTok:
[טון צעיר וטרנדי]

**🎪 Targeting**
[טווחי גילאים, interests, placements, bid strategy, frequency]`;

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
      },
      body: JSON.stringify({
        model: 'claude-opus-4-20250514',
        max_tokens: 4000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!response.ok) throw new Error('API Error');

    const data = await response.json();
    const content = data.content[0].text;

    resultsData.strategy = extractSection(content, 'אסטרטגיה');
    resultsData.angles = extractSection(content, 'זוויות');
    resultsData.banners = extractSection(content, 'באנרים');
    resultsData.scripts = extractSection(content, 'סקריפטים');
    resultsData.targeting = extractSection(content, 'Targeting');

    document.getElementById('strategy').textContent = resultsData.strategy;
    document.getElementById('angles').textContent = resultsData.angles;
    document.getElementById('banners').textContent = resultsData.banners;
    document.getElementById('scripts').textContent = resultsData.scripts;
    document.getElementById('targeting').textContent = resultsData.targeting;
    document.getElementById('results').classList.add('show');

    showAlert('✅ קמפיין יצור בהצלחה!', 'success');
  } catch (err) {
    showAlert('❌ ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '🚀 יצור קמפיין';
  }
}

function extractSection(text, keyword) {
  const regex = new RegExp(`\\*\\*.*?${keyword}.*?\\*\\*([^*]+?)(?=\\*\\*|$)`, 'is');
  const match = text.match(regex);
  return match ? match[1].trim() : 'לא נמצא תוכן';
}

function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  event.target.classList.add('active');
  currentTab = tab;
}

function showAlert(msg, type) {
  const alert = document.getElementById('alertMsg');
  alert.textContent = msg;
  alert.className = 'alert ' + type;
  alert.style.display = 'block';
}

function copyTab() {
  navigator.clipboard.writeText(document.getElementById(currentTab).textContent);
  showAlert('✅ הועתק!', 'success');
}

function downloadTab() {
  const text = document.getElementById(currentTab).textContent;
  const blob = new Blob([text], { type: 'text/plain; charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `campaign-${currentTab}.txt`;
  a.click();
}

function downloadAll() {
  const allText = `קמפיין\n${resultsData.strategy}\n\n${resultsData.angles}\n\n${resultsData.banners}\n\n${resultsData.scripts}\n\n${resultsData.targeting}`;
  const blob = new Blob([allText], { type: 'text/plain; charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'campaign-complete.txt';
  a.click();
}

function reset() {
  document.getElementById('clientName').value = '';
  document.getElementById('campaignType').value = '';
  document.getElementById('targetAudience').value = '';
  document.getElementById('campaignGoal').value = '';
  document.getElementById('description').value = '';
  document.getElementById('results').classList.remove('show');
  resultsData = {};
}
</script>
</body>
</html>
